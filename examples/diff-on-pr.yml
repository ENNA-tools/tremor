name: Tremor Trust Surface Diff

on:
  pull_request:
    paths:
      - '.github/workflows/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  tremor-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: 1oosedows/tremor@main
        with:
          mode: diff
          base-ref: origin/main
