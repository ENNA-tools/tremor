name: 'Tremor'
description: 'Pipeline behavioral anomaly detection — audit your CI/CD runtime for supply chain deviations'
author: 'ENNA-tools'

branding:
  icon: 'activity'
  color: 'orange'

inputs:
  mode:
    description: 'Detection mode: audit | monitor | diff | epicenter'
    required: false
    default: 'audit'
  severity-threshold:
    description: 'Minimum severity to fail the check: low, medium, high, critical'
    required: false
    default: 'medium'
  baseline-path:
    description: 'Path to behavioral baseline file (auto-generated on first run)'
    required: false
    default: '.tremor/baseline.json'
  config-path:
    description: 'Path to tremor config file'
    required: false
    default: '.tremor/config.yml'
  base-ref:
    description: 'Base ref for diff mode (branch to compare against)'
    required: false
    default: 'origin/main'
  post-comment:
    description: 'Post findings as a PR comment (diff mode only, requires GITHUB_TOKEN)'
    required: false
    default: 'true'
  target:
    description: 'Path to scan in epicenter mode (build output directory)'
    required: false
    default: '.'
  threshold:
    description: 'Anomaly score threshold for epicenter mode (0-100, exits non-zero if met)'
    required: false
    default: '25'

outputs:
  findings:
    description: 'JSON array of detected anomalies'
    value: ${{ steps.tremor.outputs.findings }}
  risk-score:
    description: 'Aggregate risk score (0-100)'
    value: ${{ steps.tremor.outputs.risk-score }}
  summary:
    description: 'Human-readable summary of findings'
    value: ${{ steps.tremor.outputs.summary }}
  risk-delta:
    description: 'Trust surface risk delta from diff mode (-100 to +100)'
    value: ${{ steps.tremor.outputs.risk-delta }}
  epicenter-score:
    description: 'Overall anomaly score from artifact scanning (epicenter mode)'
    value: ${{ steps.tremor.outputs.epicenter-score }}

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: pip install pyyaml

    - name: Run Tremor
      id: tremor
      shell: bash
      env:
        TREMOR_MODE: ${{ inputs.mode }}
        TREMOR_SEVERITY: ${{ inputs.severity-threshold }}
        TREMOR_BASELINE: ${{ inputs.baseline-path }}
        TREMOR_CONFIG: ${{ inputs.config-path }}
        TREMOR_BASE_REF: ${{ inputs.base-ref }}
        TREMOR_TARGET: ${{ inputs.target }}
        TREMOR_THRESHOLD: ${{ inputs.threshold }}
      run: python3 ${{ github.action_path }}/src/main.py
